version: 2
updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 10
    groups:
      bun-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    groups:
      gha-all:
        update-types:
          - minor
          - patch
          - major
    labels:
      - ci
    commit-message:
      prefix: "chore(ci)"
