name: Update dependencies

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      group:
        description: Dependency group to update
        required: true
        type: choice
        default: all
        options:
          - all
          - catalog-shared
          - web-stack
          - server-data
          - tooling

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update ${{ matrix.group.id }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meteor
      BETTER_AUTH_SECRET: better-auth-secret-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3001
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    strategy:
      fail-fast: false
      matrix:
        group:
          - id: catalog-shared
            branch: chore/update-catalog-shared-deps
            title: "chore(deps): update catalog shared dependencies"
          - id: web-stack
            branch: chore/update-web-stack-deps
            title: "chore(deps): update web stack dependencies"
          - id: server-data
            branch: chore/update-server-data-deps
            title: "chore(deps): update server data dependencies"
          - id: tooling
            branch: chore/update-tooling-deps
            title: "chore(deps): update tooling dependencies"

    steps:
      - name: Resolve selected group
        id: selection
        shell: bash
        run: |
          selected_group="${{ github.event.inputs.group }}"
          current_group="${{ matrix.group.id }}"

          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "$selected_group" == "all" || "$selected_group" == "$current_group" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.selection.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.selection.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        if: steps.selection.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Update dependency manifests
        if: steps.selection.outputs.should_run == 'true'
        env:
          SUMMARY_FILE: ${{ runner.temp }}/update-summary-${{ matrix.group.id }}.md
        run: >
          bun .github/scripts/deps/update-deps.ts
          --group=${{ matrix.group.id }}
          --strategy=latest
          --summary-file="${SUMMARY_FILE}"

      - name: Refresh bun.lock
        if: steps.selection.outputs.should_run == 'true'
        run: bun install

      - name: Validate workspace types
        if: steps.selection.outputs.should_run == 'true'
        run: bun run check-types

      - name: Detect changes
        if: steps.selection.outputs.should_run == 'true'
        id: changes
        shell: bash
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.selection.outputs.should_run == 'true' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ matrix.group.branch }}
          commit-message: ${{ matrix.group.title }}
          title: ${{ matrix.group.title }}
          body-path: ${{ runner.temp }}/update-summary-${{ matrix.group.id }}.md
          delete-branch: true
          labels: dependencies
