name: Dependency Updates

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-updates-${{ matrix.area }}
  cancel-in-progress: true

jobs:
  update:
    name: Update ${{ matrix.area }} dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        area: [root, backend, frontend, catalog]
      fail-fast: false
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency updater (${{ matrix.area }})
        run: bun run scripts/update-deps.ts --area ${{ matrix.area }}

      - name: Verify lockfile is still frozen
        run: bun install --frozen-lockfile

      - name: Run CI checks
        run: |
          bun run check:ci
          bun run build
          bun run check-types

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): bump ${{ matrix.area }} dependencies"
          branch: chore/deps-${{ matrix.area }}
          delete-branch: true
          title: "chore(deps): bump ${{ matrix.area }} dependencies"
          body: |
            Automated dependency update for the `${{ matrix.area }}` area.

            This PR was generated by the `Dependency Updates` workflow.
          labels: |
            ${{ matrix.area }}-deps
            dependencies
